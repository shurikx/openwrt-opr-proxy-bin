name: Build Opera Proxy APK (v25)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      ver: ${{ steps.get_ver.outputs.ver }}
    steps:
      - name: Get Latest Version
        id: get_ver
        run: |
          VER=$(curl -fs -o /dev/null -w %{redirect_url} https://github.com/Snawoot/opera-proxy/releases/latest | cut -d '/' -f8 | sed 's/^v//')
          echo "ver=$VER" >> $GITHUB_OUTPUT
          echo "VER=$VER" >> $GITHUB_ENV

      - name: Check Release
        id: check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/${{ github.repository }}/releases/tags/v${{ env.VER }})
          echo "exists=$([ "$HTTP_STATUS" -eq 200 ] && echo 'true' || echo 'false')" >> $GITHUB_OUTPUT

  build:
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - arch: "mipsle"
            target: "ramips/mt7621"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/ramips/mt7621/openwrt-sdk-25.12.0-ramips-mt7621_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            pkg_arch: "mipsel_24kc"
          - arch: "arm64"
            target: "mediatek/filogic"
            sdk_url: "https://downloads.openwrt.org/releases/25.12.0/targets/mediatek/filogic/openwrt-sdk-25.12.0-mediatek-filogic_gcc-14.3.0_musl.Linux-x86_64.tar.zst"
            pkg_arch: "aarch64_cortex-a53"
    
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt update && sudo apt install -y libncurses5-dev zstd

      - name: Setup SDK
        run: |
          wget -O sdk.tar.zst ${{ matrix.sdk_url }}
          mkdir sdk
          tar --use-compress-program=unzstd -xf sdk.tar.zst -C sdk --strip-components=1

      - name: Prepare Package
        run: |
          cp -r opera-proxy sdk/package/
          cd sdk/package/opera-proxy
          chmod +x update.sh
          ./update.sh ${{ matrix.arch }}

      - name: Compile
        run: |
          cd sdk
          ./scripts/feeds update base
          ./scripts/feeds install -a
          
          # Принудительно включаем наш пакет
          echo "CONFIG_PACKAGE_opera-proxy=y" > .config
          make defconfig
          
          # Собираем
          make package/opera-proxy/compile V=s -j$(nproc) IGNORE_ERRORS=m
          
          # ДИАГНОСТИКА: Посмотрим, какие файлы вообще создались в папке bin
          echo "--- Список найденных APK файлов ---"
          find bin/packages/ -name "*.apk" || echo "APK файлы не найдены"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ matrix.arch }}
          # Поиск по всем подпапкам внутри bin/packages/
          path: sdk/bin/packages/**/opera-proxy_*.apk
          if-no-files-found: error # Теперь упадет с ошибкой, если файла нет, чтобы мы не гадали
  publish:
    needs: [check-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.check-version.outputs.ver }}
          files: artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
